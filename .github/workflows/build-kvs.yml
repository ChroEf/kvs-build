name: Build KVS aarch64 libs
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04-arm   # Native ARM64 runner — no QEMU needed
    timeout-minutes: 60
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            cmake g++ git pkg-config m4 \
            libssl-dev \
            liblog4cplus-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            ca-certificates

      - name: Create output directory
        run: mkdir -p ${{ github.workspace }}/output

      - name: Build KVS v3.6.0 for aarch64
        run: |
          set -e
          git clone --branch v3.6.0 \
            https://github.com/awslabs/amazon-kinesis-video-streams-producer-sdk-cpp.git /tmp/kvs-sdk
          cd /tmp/kvs-sdk
          git submodule update --init --recursive
          mkdir build && cd build
          cmake .. \
            -DBUILD_GSTREAMER_PLUGIN=ON \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          echo '=== Copying .so files ==='
          find /tmp/kvs-sdk/build -name '*.so*' -exec cp -P {} ${{ github.workspace }}/output/ \;
          ls -la ${{ github.workspace }}/output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kvs-libs-aarch64-v3.6.0
          path: output/
          if-no-files-found: error
